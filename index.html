<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chameleon Vision | Detector de Color</title>
    <style>
        :root {
            --bg-color: #121212;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --transition-speed: 0.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed) ease;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        header h1 { font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 5px; }
        .highlight { color: var(--accent-color); text-shadow: 0 0 10px var(--accent-color); }
        header p { font-size: 0.9rem; opacity: 0.7; margin-bottom: 25px; }

        .camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .crosshair {
            position: absolute; top: 50%; left: 50%; width: 30px; height: 30px;
            border: 2px solid var(--accent-color); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 5;
        }

        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: var(--accent-color); }
        .crosshair::before { top: 50%; left: -10px; width: 50px; height: 1px; }
        .crosshair::after { left: 50%; top: -10px; height: 50px; width: 1px; }

        .scan-area {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            border: 1px dashed rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%); pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .info-panel {
            display: flex; align-items: center; gap: 20px; padding: 20px;
            background: rgba(0, 0, 0, 0.2); border-radius: 20px; margin-bottom: 20px; text-align: left;
        }

        .preview-circle {
            width: 60px; height: 60px; border-radius: 50%; background: #000;
            border: 3px solid rgba(255, 255, 255, 0.2); transition: background-color 0.3s ease;
        }

        .details h2 { font-size: 1.2rem; margin-bottom: 5px; }
        #color-hex { font-family: monospace; font-size: 1rem; opacity: 0.8; }
        .message { margin-top: 5px; font-size: 0.85rem; font-style: italic; color: var(--accent-color); }
        #score-container { font-size: 1.5rem; font-weight: 900; margin: 10px 0; color: var(--accent-color); }
        #color-value { font-size: 2rem; color: #000; background: var(--accent-color); padding: 0 10px; border-radius: 8px; margin-right: 5px; }
        .verdict { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; margin-top: 10px; color: var(--accent-color); }

        #start-btn {
            width: 100%; padding: 15px; background: var(--accent-color); border: none; border-radius: 15px;
            color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.3s ease;
        }
        #start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 255, 204, 0.5); }

        .test-bench { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .test-bench p { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; opacity: 0.6; }
        .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .test-color { aspect-ratio: 1; border-radius: 12px; cursor: pointer; border: 2px solid rgba(255, 255, 255, 0.1); transition: all 0.2s ease; }
        .test-color:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CHAMELEON <span class="highlight">VISION</span></h1>
            <p>Apunta con tu cámara a un objeto para activar una respuesta.</p>
        </header>
        <main>
            <div class="camera-wrapper">
                <video id="video" autoplay playsinline></video>
                <div class="crosshair"></div>
                <div class="scan-area"></div>
            </div>
            <div class="info-panel">
                <div id="color-preview" class="preview-circle"></div>
                <div class="details">
                    <h2 id="color-name">Iniciando cámara...</h2>
                    <p id="color-hex">#000000</p>
                    <div id="score-container"><span id="color-value">0</span>/10</div>
                    <p id="reaction-msg" class="message">Esperando señal de video...</p>
                    <p id="verdict-msg" class="verdict"></p>
                </div>
            </div>
            <button id="start-btn">ACTIVAR CÁMARA</button>
            <div class="test-bench">
                <p>O prueba con estos colores:</p>
                <div class="palette">
                    <div class="test-color" style="background: #ff4b2b;"></div>
                    <div class="test-color" style="background: #ff8c00;"></div>
                    <div class="test-color" style="background: #ffd700;"></div>
                    <div class="test-color" style="background: #2ecc71;"></div>
                    <div class="test-color" style="background: #00ced1;"></div>
                    <div class="test-color" style="background: #3498db;"></div>
                    <div class="test-color" style="background: #9b59b6;"></div>
                    <div class="test-color" style="background: #ff69b4;"></div>
                    <div class="test-color" style="background: #000000;"></div>
                    <div class="test-color" style="background: #ffffff;"></div>
                </div>
            </div>
        </main>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const colorPreview = document.getElementById('color-preview');
        const colorNameText = document.getElementById('color-name');
        const colorHexText = document.getElementById('color-hex');
        const colorValueText = document.getElementById('color-value');
        const reactionMsg = document.getElementById('reaction-msg');
        const verdictMsg = document.getElementById('verdict-msg');
        const startBtn = document.getElementById('start-btn');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let isCameraActive = false;
        const reactions = [
            { range: [0, 20], name: 'Rojo', msg: 'Alerta de riesgo sistémico.', color: '#ff4b2b', value: 1 },
            { range: [20, 45], name: 'Naranja', msg: 'Inestabilidad emocional y económica.', color: '#ff8c00', value: 2 },
            { range: [45, 70], name: 'Amarillo', msg: 'Esfuerzo insuficiente para el mercado.', color: '#ffd700', value: 3 },
            { range: [70, 150], name: 'Verde', msg: 'Crecimiento dentro de los límites.', color: '#2ecc71', value: 4 },
            { range: [150, 200], name: 'Cian', msg: 'Serenidad improductiva.', color: '#00ced1', value: 5 },
            { range: [200, 260], name: 'Azul', msg: 'Estabilidad de clase media.', color: '#3498db', value: 6 },
            { range: [260, 320], name: 'Violeta', msg: 'Aspiraciones de estatus superior.', color: '#9b59b6', value: 7 },
            { range: [320, 360], name: 'Rosa', msg: 'Optimismo ingenuo y frágil.', color: '#ff69b4', value: 8 }
        ];
        const verdicts = { 1: "FRACASO ABSOLUTO.", 2: "DECEPCIÓN SOCIAL.", 3: "SIN FUTURO.", 4: "MANO DE OBRA BARATA.", 5: "MEDIOCRIDAD.", 6: "ENGRANAJE ÚTIL.", 7: "ACTIVO RENTABLE.", 8: "CAPITAL HUMANO ALTO.", 9: "ELITE PRODUCTIVA.", 10: "PERFECCIÓN SUPREMA." };
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 640, height: 480 } });
                video.srcObject = stream;
                isCameraActive = true;
                startBtn.style.display = 'none';
                video.onloadedmetadata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; processVideo(); };
            } catch (err) { reactionMsg.innerText = "Error: Sin acceso a cámara."; }
        }
        function processVideo() {
            if (!isCameraActive) return;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData((canvas.width/2)-10, (canvas.height/2)-10, 20, 20).data;
            let r=0,g=0,b=0;
            for (let i = 0; i < imageData.length; i += 4) { r += imageData[i]; g += imageData[i+1]; b += imageData[i+2]; }
            r=Math.floor(r/(imageData.length/4)); g=Math.floor(g/(imageData.length/4)); b=Math.floor(b/(imageData.length/4));
            updateUI(r, g, b, rgbToHex(r, g, b), rgbToHsl(r, g, b));
            requestAnimationFrame(processVideo);
        }
        function updateUI(r, g, b, hex, hsl) {
            const [h, s, l] = hsl;
            let reaction = l < 15 ? { name: 'Negro', msg: 'Oscuridad absoluta.', color: '#1a1a1a', value: 10 } :
                          l > 85 ? { name: 'Blanco', msg: 'Claridad total.', color: '#f0f0f0', value: 9 } :
                          s < 15 ? { name: 'Gris', msg: 'Neutralidad pura.', color: '#808080', value: 5 } :
                          reactions.find(res => h >= res.range[0] && h < res.range[1]);
            if (reaction) {
                colorNameText.innerText = reaction.name; colorHexText.innerText = hex; colorValueText.innerText = reaction.value;
                reactionMsg.innerText = reaction.msg; verdictMsg.innerText = verdicts[reaction.value];
                colorPreview.style.backgroundColor = `rgb(${r},${g},${b})`;
                document.documentElement.style.setProperty('--accent-color', reaction.color);
            }
        }
        function rgbToHex(r, g, b) { return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase(); }
        function rgbToHsl(r, g, b) {
            r/=255; g/=255; b/=255; const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min; let h, s, l=(max+min)/2;
            if(max===min) h=s=0; else { s=l>0.5?d/(2-max-min):d/(max+min); switch(max){ case r: h=(g-b)/d+(g<b?6:0); break; case g: h=(b-r)/d+2; break; case b: h=(r-g)/d+4; break; } h/=6; }
            return [Math.floor(h*360), Math.floor(s*100), Math.floor(l*100)];
        }
        document.querySelectorAll('.test-color').forEach(btn => btn.addEventListener('click', () => {
            const rgb = window.getComputedStyle(btn).backgroundColor.match(/\d+/g).map(Number);
            updateUI(rgb[0], rgb[1], rgb[2], rgbToHex(rgb[0], rgb[1], rgb[2]), rgbToHsl(rgb[0], rgb[1], rgb[2]));
        }));
        startBtn.addEventListener('click', initCamera);
    </script>
</body>
</html>
