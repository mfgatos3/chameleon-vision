<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>La Ruleta del Mérito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000;
      --fg: #f0ede6;
      --accent: #00ffcc;
      --color-now: #00ffcc;
      --color-dim: rgba(0,255,204,0.12);
      --trans: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      touch-action: none;
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.3;
      pointer-events: none;
      transition: background-color 1.5s ease;
      z-index: 0;
    }
    .blob-a { width: 90vw; height: 90vw; top: -25%; left: -25%; background: var(--color-now); }
    .blob-b { width: 70vw; height: 70vw; bottom: -15%; right: -15%; background: var(--color-now); opacity: 0.2; }

    /* ─── ROULETTE CONTAINER ────────────────────────── */
    .roulette-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      cursor: pointer;
    }

    .wheel-wrapper {
      width: 85vh;
      height: 85vh;
      max-width: 90vw;
      max-height: 90vw;
      border-radius: 50%;
      border: 12px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 100px rgba(0,0,0,1);
      overflow: hidden;
      position: relative;
      transition: transform 7s cubic-bezier(0.1, 0, 0.05, 1);
      background: #111;
    }

    #wheel-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .indicator {
      position: absolute;
      top: 2vh;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 30px solid transparent;
      border-right: 30px solid transparent;
      border-top: 50px solid #fff;
      z-index: 10;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
    }

    .tap-hint {
      position: absolute;
      bottom: 6vh;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 10px;
      opacity: 0.4;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.6; transform: translateX(-50%) scale(1.05); }
    }

    /* ─── POPUP ──────────────────────────────────────── */
    #result-popup {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease;
    }

    #result-popup.visible { opacity: 1; visibility: visible; }

    .popup-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 25vw, 15rem);
      line-height: 0.8;
      color: var(--color-now);
      text-shadow: 0 0 80px var(--color-now);
    }

    .popup-msg {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      margin: 20px 0;
    }

    .popup-verdict {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 8vw, 4rem);
      letter-spacing: 10px;
      color: var(--color-now);
      border: 2px solid var(--color-now);
      padding: 10px 40px;
    }

    .close-btn {
      margin-top: 50px;
      background: var(--color-now);
      color: #000;
      border: none;
      padding: 20px 60px;
      border-radius: 100px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="bg-blob blob-a"></div>
  <div class="bg-blob blob-b"></div>

  <div class="roulette-container" id="spin-area">
    <div class="indicator"></div>
    <div class="wheel-wrapper" id="wheel">
      <canvas id="wheel-canvas"></canvas>
    </div>
    <div class="tap-hint" id="hint-text">TOCA PARA ANALIZAR</div>
  </div>

  <div id="result-popup">
    <div class="popup-content">
      <div class="popup-label" id="pop-label">NIVEL X</div>
      <div class="popup-msg" id="pop-msg">Procesando...</div>
      <div class="popup-verdict" id="pop-verdict"></div>
      <br>
      <button class="close-btn" onclick="closePopup()">CONTINUAR</button>
    </div>
  </div>

  <script>
    const merits = [
      { id: 1,  name: 'UNO',    color: '#ff4b2b', msg: 'Riesgo sistémico detectado.',           verdict: 'FRACASO ABSOLUTO' },
      { id: 2,  name: 'DOS',    color: '#ff8c00', msg: 'Inestabilidad emocional.',              verdict: 'DECEPCIÓN SOCIAL' },
      { id: 3,  name: 'TRES',   color: '#ffd700', msg: 'Esfuerzo insuficiente.',                verdict: 'SIN FUTURO' },
      { id: 4,  name: 'CUATRO', color: '#2ecc71', msg: 'Crecimiento limitado.',                  verdict: 'MANO DE OBRA BARATA' },
      { id: 5,  name: 'CINCO',  color: '#888888', msg: 'Neutralidad estéril.',                  verdict: 'MEDIOCRIDAD' },
      { id: 6,  name: 'SEIS',   color: '#3498db', msg: 'Estabilidad estándar.',                  verdict: 'ENGRANAJE ÚTIL' },
      { id: 7,  name: 'SIETE',  color: '#9b59b6', msg: 'Aspiraciones de estatus.',               verdict: 'ACTIVO RENTABLE' },
      { id: 8,  name: 'OCHO',   color: '#ff69b4', msg: 'Optimismo ingenuo.',                    verdict: 'CAPITAL HUMANO ALTO' },
      { id: 9,  name: 'NUEVE',  color: '#ffffff', msg: 'Claridad productiva.',                  verdict: 'ELITE DEL SISTEMA' },
      { id: 10, name: 'DIEZ',   color: '#00ced1', msg: 'Perfección absoluta.',                  verdict: 'IDEAL CAPITALISTA' }
    ];

    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    const wheel = document.getElementById('wheel');
    const spinArea = document.getElementById('spin-area');
    const popup = document.getElementById('result-popup');

    function draw() {
      const size = 1200;
      canvas.width = canvas.height = size;
      const arc = (Math.PI * 2) / merits.length;
      ctx.translate(size/2, size/2);

      merits.forEach((m, i) => {
        const angle = i * arc;
        ctx.beginPath();
        ctx.fillStyle = m.color;
        ctx.moveTo(0,0);
        ctx.arc(0,0, size/2, angle, angle + arc);
        ctx.fill();

        ctx.save();
        ctx.rotate(angle + arc/2);
        ctx.textAlign = "right";
        ctx.fillStyle = (i === 8 || i === 9) ? "#000" : "#fff";
        ctx.font = "bold 85px 'Bebas Neue'";
        ctx.fillText(m.id, size/2 - 80, 30);
        ctx.restore();
      });

      ctx.beginPath();
      ctx.fillStyle = "#000";
      ctx.arc(0,0, 60, 0, Math.PI*2);
      ctx.fill();
    }

    let rotation = 0;
    let isSpinning = false;

    spinArea.onclick = () => {
      if (isSpinning) return;
      isSpinning = true;
      document.getElementById('hint-text').style.opacity = '0';
      
      const index = Math.floor(Math.random() * merits.length);
      const arcDeg = 360 / merits.length;
      const extraSpins = 7 + Math.floor(Math.random() * 5);
      
      const targetOffset = 270 - (index * arcDeg + arcDeg/2);
      const currentNorm = rotation % 360;
      const additionalRotation = (extraSpins * 360) + (targetOffset - currentNorm + 360) % 360;
      
      rotation += additionalRotation;
      wheel.style.transform = `rotate(${rotation}deg)`;

      setTimeout(() => {
        showResult(merits[index]);
      }, 7200);
    };

    function showResult(m) {
      document.documentElement.style.setProperty('--color-now', m.color);
      document.getElementById('pop-label').textContent = `NIVEL ${m.id}`;
      document.getElementById('pop-msg').textContent = m.msg;
      document.getElementById('pop-verdict').textContent = m.verdict;
      popup.classList.add('visible');
      speak(`Sujeto analizado. Nivel de mérito: ${m.id}. ${m.msg}. Veredicto: ${m.verdict}.`);
    }

    function closePopup() {
      popup.classList.remove('visible');
      isSpinning = false;
      document.getElementById('hint-text').style.opacity = '0.4';
      speechSynthesis.cancel();
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      const voices = speechSynthesis.getVoices();
      const v = voices.find(v => v.name.includes('Google') && v.lang.startsWith('es')) || voices.find(v => v.lang.startsWith('es'));
      if (v) utt.voice = v;
      utt.rate = 1.0;
      speechSynthesis.speak(utt);
    }

    draw();
    window.addEventListener('resize', draw);
    window.speechSynthesis.onvoiceschanged = () => {};
  </script>
</body>
</html>
